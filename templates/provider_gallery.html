{% extends "base.html" %}
{% block title %}My Gallery{% endblock %}
{% block content %}
<div class="container">
    <h1>Work Gallery</h1>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Upload Image</label>
            <input type="file" name="gallery_image" accept="image/*" required>
        </div>
        <div class="form-group">
            <label>Caption (optional)</label>
            <input type="text" name="caption" placeholder="Describe this work...">
        </div>
        <button type="submit" class="btn btn-primary">Add to Gallery</button>
    </form>

    <div class="gallery-grid">
        {% for img in images %}
        <div class="gallery-item">
            <img src="{{ url_for('static', filename='uploads/' + img.filename) }}" alt="{{ img.caption }}">
            <p>{{ img.caption or 'No caption' }}</p>
            <form method="POST" action="{{ url_for('delete_gallery_image', image_id=img.id) }}" onsubmit="return confirm('Delete this image?');">
                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
