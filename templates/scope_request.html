{% extends "base.html" %}

{% block title %}Request Scope{% endblock %}

{% block content %}
<div class="container">
    <div class="form-page narrow">
        <div class="form-header">
            <h1>Request a Scope</h1>
            <p>Describe your needs for <strong>{{ service.title }}</strong> by {{ service.provider.full_name }}</p>
        </div>
        
        <form method="POST" class="scope-form">
            <div class="form-group">
                <label>Describe your task *</label>
                <textarea name="description" rows="6" required placeholder="Be specific about what you need done. Include details like size, condition, materials, deadlines, etc."></textarea>
            </div>
            
            <div class="form-group">
                <label>Your Location</label>
                <input type="text" name="location" placeholder="Where will the service take place?">
            </div>
            
            <div class="form-group">
                <label>Preferred Date & Time</label>
                <input type="datetime-local" name="preferred_date">
            </div>
            
            <div class="info-box" style="background: #eff6ff; padding:1rem; border-radius:var(--radius); margin:1rem 0;">
                <i class="fas fa-info-circle" style="color:var(--primary);"></i>
                <p>The provider will review your request and respond with an estimated cost and timeframe.</p>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg">Send Request</button>
        </form>
    </div>
</div>
{% endblock %}
