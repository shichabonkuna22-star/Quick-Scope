{% extends "base.html" %}
{% block title %}Chat with {{ other_user.full_name }}{% endblock %}
{% block content %}
<div class="container">
    <h1>Chat with {{ other_user.full_name }}</h1>
    <div class="chat-box">
        <div class="chat-messages" id="chatMessages">
            {% for msg in messages %}
                <div class="chat-message {{ 'sent' if msg.sender_id == current_user.id else 'received' }}">
                    <div class="message-sender">{{ msg.sender.full_name }}</div>
                    <div class="message-text">{{ msg.message }}</div>
                    <div class="message-time">{{ format_datetime(msg.created_at) }}</div>
                </div>
            {% endfor %}
        </div>
        <div class="chat-input">
            <form id="chatForm" method="POST">
                <input type="text" name="message" id="chatInput" placeholder="Type your message..." required>
                <button type="submit" class="btn btn-primary">Send</button>
            </form>
        </div>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatForm = document.getElementById('chatForm');
    let lastId = {{ messages[-1].id if messages else 0 }};

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    scrollToBottom();

    function fetchMessages() {
        fetch(`/chat/messages?user_id={{ other_user.id }}&last_id=${lastId}`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    data.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = `chat-message ${msg.sender_id == {{ current_user.id }} ? 'sent' : 'received'}`;
                        div.innerHTML = `
                            <div class="message-sender">${msg.sender_name}</div>
                            <div class="message-text">${msg.message}</div>
                            <div class="message-time">${msg.created_at}</div>
                        `;
                        chatMessages.appendChild(div);
                        lastId = msg.id;
                    });
                    scrollToBottom();
                }
            });
    }

    setInterval(fetchMessages, 3000);

    chatForm.addEventListener('submit', function(e) {
        // normal submit – page reloads, but we can also use AJAX if desired
        // We'll let the form submit normally for simplicity
    });
});
</script>
<style>
.chat-box {
    max-width: 700px;
    margin: 0 auto;
    border: 1px solid #ddd;
    border-radius: var(--radius);
    overflow: hidden;
}
.chat-messages {
    height: 400px;
    overflow-y: auto;
    padding: 1rem;
    background: #f9f9f9;
}
.chat-message {
    margin-bottom: 1rem;
    padding: 0.5rem 1rem;
    border-radius: var(--radius);
    max-width: 80%;
}
.chat-message.sent {
    background: #dcf8c6;
    margin-left: auto;
    text-align: right;
}
.chat-message.received {
    background: #fff;
    border: 1px solid #ddd;
}
.message-sender {
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 0.25rem;
}
.message-time {
    font-size: 0.7rem;
    color: #999;
    margin-top: 0.25rem;
}
.chat-input {
    padding: 1rem;
    background: #fff;
    border-top: 1px solid #ddd;
}
.chat-input form {
    display: flex;
    gap: 0.5rem;
}
.chat-input input {
    flex: 1;
}
</style>
{% endblock %}
