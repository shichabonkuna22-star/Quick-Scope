{% extends "base.html" %}

{% block title %}Leave Review{% endblock %}

{% block content %}
<div class="container">
    <div class="form-page narrow">
        <div class="form-header">
            <h1>Leave a Review</h1>
            <p>How was your experience with <strong>{{ booking.provider_booking.full_name }}</strong> for <strong>{{ booking.service.title }}</strong>?</p>
        </div>
        
        <form method="POST" class="review-form">
            <div class="form-group">
                <label>Rating</label>
                <div class="star-rating" id="starRating">
                    <div class="stars-container">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                    </div>
                    <input type="hidden" name="rating" id="ratingInput" value="0" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Your Review</label>
                <textarea name="comment" rows="5" placeholder="Share details about your experience..."></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg">Submit Review</button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const stars = document.querySelectorAll('.star');
        const ratingInput = document.getElementById('ratingInput');
        let selectedRating = 0;

        function updateStars(rating) {
            stars.forEach(star => {
                const value = parseInt(star.getAttribute('data-value'));
                if (value <= rating) {
                    star.classList.add('filled');
                } else {
                    star.classList.remove('filled');
                }
            });
        }

        stars.forEach(star => {
            star.addEventListener('click', function() {
                const value = parseInt(this.getAttribute('data-value'));
                selectedRating = value;
                ratingInput.value = value;
                updateStars(value);
            });

            star.addEventListener('mouseenter', function() {
                const value = parseInt(this.getAttribute('data-value'));
                updateStars(value);
            });

            star.addEventListener('mouseleave', function() {
                updateStars(selectedRating);
            });
        });
    });
</script>
{% endblock %}
